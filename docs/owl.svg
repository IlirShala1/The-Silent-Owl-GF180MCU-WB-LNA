<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 64 64"
     shape-rendering="crispEdges">

  <rect width="64" height="64" fill="white"/>

  <g fill="black">

    <!-- Ears -->
    <rect x="20" y="8" width="4" height="4"/>
    <rect x="40" y="8" width="4" height="4"/>

    <!-- Head -->
    <rect x="16" y="12" width="32" height="4"/>
    <rect x="12" y="16" width="40" height="4"/>

    <!-- Wings -->
    <rect x="6" y="34" width="10" height="4"/>
    <rect x="4" y="38" width="12" height="4"/>
    <rect x="6" y="42" width="10" height="4"/>

    <rect x="48" y="34" width="10" height="4"/>
    <rect x="48" y="38" width="12" height="4"/>
    <rect x="48" y="42" width="10" height="4"/>

    <!-- Left glasses -->
    <rect x="14" y="24" width="12" height="2"/>
    <rect x="14" y="24" width="2" height="12"/>
    <rect x="24" y="24" width="2" height="12"/>
    <rect x="14" y="34" width="12" height="2"/>

    <!-- Right glasses -->
    <rect x="38" y="24" width="12" height="2"/>
    <rect x="38" y="24" width="2" height="12"/>
    <rect x="48" y="24" width="2" height="12"/>
    <rect x="38" y="34" width="12" height="2"/>

    <!-- Glasses bridge -->
    <rect x="26" y="28" width="12" height="2"/>

    <!-- Eyes (OPEN restored) -->
    <rect x="18" y="28" width="4" height="4"/>
    <rect x="42" y="28" width="4" height="4"/>

    <!-- Beak -->
    <rect x="30" y="34" width="4" height="4"/>

    <!-- Body -->
    <rect x="20" y="42" width="24" height="2"/>
    <rect x="18" y="44" width="28" height="2"/>
    <rect x="16" y="46" width="32" height="2"/>
    <rect x="16" y="48" width="32" height="2"/>
    <rect x="18" y="50" width="28" height="2"/>
    <rect x="20" y="52" width="24" height="2"/>

    <!-- Feet -->
    <rect x="24" y="54" width="4" height="4"/>
    <rect x="36" y="54" width="4" height="4"/>

  </g>
</svg>